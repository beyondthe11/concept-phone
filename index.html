<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kāppi Coffee | Acid Editorial</title>
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Minimalist SVG Icons ---
        const ArrowRight = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const Asterisk = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 6v12"/><path d="M17.196 9 6.804 15"/><path d="m6.804 9 10.392 6"/></svg>
        );

        // --- Global Styles & Keyframes ---
        const CustomStyles = () => (
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400;1,900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Malayalam:wght@300;400;700;900&display=swap');

            :root {
              --bg: #0b001a;         /* Deep Space Purple */
              --fg: #f0f0f0;         /* Stark White */
              --c1: #00f3ff;         /* Neon Cyan */
              --c2: #ff0055;         /* Hot Pink */
              --c3: #ccff00;         /* Acid Yellow */
              --border: var(--c1);   /* Cyan Borders */
            }

            html {
              scroll-behavior: smooth;
            }

            body {
              background-color: var(--bg);
              color: var(--fg);
              font-family: 'Space Mono', monospace;
              overflow-x: hidden;
              margin: 0;
              -webkit-font-smoothing: antialiased;
            }

            .font-serif-elegant {
              font-family: 'Playfair Display', serif;
            }
            .font-malayalam {
              font-family: 'Noto Serif Malayalam', serif;
            }

            /* Editorial Borders with Neon Color */
            .border-grid {
              border-color: var(--border);
            }

            /* Custom Selection */
            ::selection {
              background: var(--c3);
              color: #000;
            }

            /* --- Animations --- */
            @keyframes marquee {
              0% { transform: translateX(0%); }
              100% { transform: translateX(-50%); }
            }

            .animate-marquee {
              display: inline-block;
              white-space: nowrap;
              animation: marquee 12s linear infinite;
            }

            @keyframes spin-slow {
              100% { transform: rotate(360deg); }
            }
            .animate-spin-slow {
              animation: spin-slow 10s linear infinite;
            }

            @keyframes float {
              0%, 100% { transform: translateY(0px) rotate(0deg); }
              50% { transform: translateY(-20px) rotate(5deg); }
            }
            .animate-float {
              animation: float 4s ease-in-out infinite;
            }

            .fade-in-up {
              opacity: 0;
              transform: translateY(40px) scale(0.95);
              transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .fade-in-up.is-visible {
              opacity: 1;
              transform: translateY(0) scale(1);
            }

            .slide-in-right {
              opacity: 0;
              transform: translateX(100px);
              transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .slide-in-right.is-visible {
              opacity: 1;
              transform: translateX(0);
            }

            /* Aggressive Hover States */
            .hover-invert-pink {
              transition: all 0.3s ease;
            }
            .hover-invert-pink:hover {
              background-color: var(--c2);
              color: #fff;
              border-color: var(--c2);
              transform: scale(1.02);
              box-shadow: 8px 8px 0px var(--c1);
            }

            .hover-invert-cyan {
              transition: all 0.3s ease;
            }
            .hover-invert-cyan:hover {
              background-color: var(--c1);
              color: #000;
              border-color: var(--c1);
              transform: translateX(-10px);
              box-shadow: -8px 8px 0px var(--c3);
            }

            .hover-jitter:hover {
              animation: jitter 0.2s infinite;
            }
            @keyframes jitter {
              0% { transform: translate(0, 0); }
              25% { transform: translate(2px, -2px); }
              50% { transform: translate(-2px, 2px); }
              75% { transform: translate(-2px, -2px); }
              100% { transform: translate(2px, 2px); }
            }

            /* --- Minimal Scrollbar --- */
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--border); }
            ::-webkit-scrollbar-thumb { background: var(--c2); }
            ::-webkit-scrollbar-thumb:hover { background: var(--c3); }
          `}} />
        );

        // --- Hooks ---
        const useIntersectionObserver = (options) => {
          const [elements, setElements] = useState([]);

          useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('is-visible');
                }
              });
            }, options);

            elements.forEach((el) => el && observer.observe(el));
            return () => observer.disconnect();
          }, [elements, options]);

          return setElements;
        };

        const useScroll = () => {
          const [scrollY, setScrollY] = useState(0);
          useEffect(() => {
            const handleScroll = () => setScrollY(window.scrollY);
            window.addEventListener('scroll', handleScroll, { passive: true });
            handleScroll();
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);
          return scrollY;
        };

        // --- Components ---

        const Marquee = ({ text, bg = "bg-[#00f3ff]", color = "text-black", border = "border-y border-[#00f3ff]", size = "text-2xl" }) => (
          <div className={`w-full overflow-hidden ${bg} ${color} ${border} py-2 flex relative z-10 font-bold uppercase tracking-widest`}>
            <div className={`animate-marquee whitespace-nowrap ${size}`}>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span>
            </div>
          </div>
        );

        const Sidebar = () => (
          <aside className="w-full md:w-1/4 border-b md:border-b-0 md:border-r border-grid p-6 md:p-10 sticky top-0 h-auto md:h-screen flex flex-col justify-between z-50 bg-[#0b001a]/90 backdrop-blur-md">
            <div>
              <h1 className="font-malayalam text-[#ccff00] text-4xl md:text-6xl mb-2 leading-none hover-jitter cursor-crosshair">കാപ്പി</h1>
              <p className="text-xs uppercase tracking-[0.2em] text-[#00f3ff] mb-12 animate-pulse">Coffee Roasters</p>
              
              <nav className="flex flex-col gap-6 text-sm uppercase tracking-widest font-bold">
                <a href="#home" className="hover:text-[#ff0055] transition-colors w-fit flex items-center gap-2 group">
                  <span className="text-[#00f3ff] opacity-0 group-hover:opacity-100 transition-opacity">→</span> 01. Home
                </a>
                <a href="#protocol" className="hover:text-[#ff0055] transition-colors w-fit flex items-center gap-2 group">
                  <span className="text-[#00f3ff] opacity-0 group-hover:opacity-100 transition-opacity">→</span> 02. Protocol
                </a>
                <a href="#philosophy" className="hover:text-[#ff0055] transition-colors w-fit flex items-center gap-2 group">
                  <span className="text-[#00f3ff] opacity-0 group-hover:opacity-100 transition-opacity">→</span> 03. Philosophy
                </a>
                <a href="#menu" className="hover:text-[#ff0055] transition-colors w-fit flex items-center gap-2 group">
                  <span className="text-[#00f3ff] opacity-0 group-hover:opacity-100 transition-opacity">→</span> 04. The Menu
                </a>
                <a href="#merch" className="hover:text-[#ff0055] transition-colors w-fit flex items-center gap-2 group">
                  <span className="text-[#00f3ff] opacity-0 group-hover:opacity-100 transition-opacity">→</span> 05. Hardware
                </a>
              </nav>
            </div>

            <div className="hidden md:block mt-12">
              <Asterisk size={40} className="text-[#ff0055] animate-spin-slow mb-4" />
              <p className="text-[10px] uppercase tracking-widest text-[#00f3ff] leading-relaxed">
                Extracting the essence<br/>
                Destroying morning routines<br/>
                Est. 2026
              </p>
            </div>
          </aside>
        );

        const HeroSection = () => {
          return (
            <section id="home" className="relative min-h-[70vh] md:min-h-screen flex flex-col justify-between border-b border-grid bg-[radial-gradient(ellipse_at_bottom_right,_#ff005520_0%,_transparent_50%)] overflow-hidden">
              
              <div className="absolute top-10 right-10 text-[#ccff00] animate-spin-slow opacity-50">
                <Asterisk size={120} strokeWidth={1} />
              </div>

              <div className="p-6 md:p-16 flex-1 flex flex-col justify-end z-10">
                <div className="max-w-4xl animate-float">
                  <h2 className="font-serif-elegant text-6xl md:text-8xl lg:text-9xl font-black leading-[0.8] text-white mb-8 fade-in-up">
                    Viscous.<br/>
                    <span className="italic text-[#00f3ff]">Sensory.</span><br/>
                    <span className="text-[#ff0055] hover-jitter inline-block">Coffee.</span>
                  </h2>
                  <p className="text-sm md:text-base uppercase tracking-widest text-[#ccff00] max-w-lg leading-relaxed fade-in-up bg-black/50 p-4 border border-[#ccff00]" style={{transitionDelay: '0.2s'}}>
                    We treat coffee as a medium. No syrups. No distractions. Just meticulously extracted single origins that command your attention.
                  </p>
                </div>
              </div>

              <Marquee text="LIQUID ADRENALINE" bg="bg-[#ff0055]" color="text-white" border="border-t border-[#00f3ff]" />
            </section>
          );
        };

        // --- Scrollytelling Section ---
        const ScrollytellingProtocol = () => {
          const scrollY = useScroll();
          const sectionRef = useRef(null);
          const [offsetTop, setOffsetTop] = useState(0);
          const [height, setHeight] = useState(0);

          useEffect(() => {
            if (sectionRef.current) {
              setOffsetTop(sectionRef.current.offsetTop);
              setHeight(sectionRef.current.offsetHeight);
            }
          }, [scrollY]);

          const windowHeight = window.innerHeight;
          const relativeScroll = Math.max(0, scrollY - offsetTop);
          const scrollableDistance = height - windowHeight;
          let progress = 0;
          if (scrollableDistance > 0) {
            progress = Math.min(1, relativeScroll / scrollableDistance);
          }

          // State Logic
          let phase = "01. CRUSH";
          let bg = "bg-[#0b001a]";
          let color = "text-[#00f3ff]";
          let shadow = "0px 0px 40px #00f3ff";
          
          if (progress > 0.33) {
            phase = "02. BLOOM";
            bg = "bg-[#ff0055]";
            color = "text-white";
            shadow = "0px 0px 60px #0b001a";
          }
          if (progress > 0.66) {
            phase = "03. EXTRACT";
            bg = "bg-[#ccff00]";
            color = "text-black";
            shadow = "none";
          }

          const subProgress = (progress % 0.33) * 3;
          const textScale = 0.8 + (subProgress * 0.7);

          return (
            <section id="protocol" ref={sectionRef} className="h-[300vh] border-b border-grid relative z-20">
              <div className={`sticky top-0 h-screen flex flex-col items-center justify-center overflow-hidden transition-colors duration-500 ${bg}`}>
                
                {/* Rotating background element */}
                <div 
                  className="absolute opacity-20 text-current pointer-events-none"
                  style={{ transform: `rotate(${progress * 360}deg) scale(${1 + progress})` }}
                >
                  <Asterisk size={600} strokeWidth={0.5} />
                </div>

                <h2 
                  className={`font-serif-elegant font-black uppercase z-10 text-center ${color}`}
                  style={{ 
                    fontSize: 'clamp(4rem, 15vw, 12rem)',
                    transform: `scale(${textScale})`,
                    textShadow: shadow
                  }}
                >
                  {phase}
                </h2>
                
                {/* Progress bar */}
                <div className="absolute bottom-10 left-10 right-10 h-2 bg-black/20 overflow-hidden border border-current">
                   <div className="h-full bg-current" style={{ width: `${progress * 100}%` }}></div>
                </div>

              </div>
            </section>
          );
        };

        const PhilosophySection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const rules = [
            { num: "I", title: "Death to Decaf", text: "We roast beans that demand attention. Maximum flavor, uncompromising extraction, zero apologies." },
            { num: "II", title: "Locally Disruptive", text: "Sourced from the wildest high-altitude estates. Every batch pushes the absolute limits of the Maillard reaction." },
            { num: "III", title: "Unadulterated", text: "No caramel-pumpkin-vanilla distractions. We respect the terroir. If you need sugar to hide the taste, you're drinking the wrong coffee." }
          ];

          return (
            <section id="philosophy" className="border-b border-grid bg-[#0b001a]">
              <Marquee text="THE MANIFESTO" bg="bg-[#ccff00]" color="text-black" border="border-b border-grid" size="text-xl" />
              
              <div className="grid grid-cols-1 lg:grid-cols-2">
                <div className="p-6 md:p-16 border-b lg:border-b-0 lg:border-r border-grid flex items-center justify-center bg-[radial-gradient(circle_at_center,_#00f3ff20_0%,_transparent_70%)]">
                  <h3 className="font-serif-elegant font-black text-6xl md:text-8xl leading-none text-center lg:text-left fade-in-up text-white" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>
                    The<br/>
                    <span className="italic text-[#ff0055]">Rules.</span>
                  </h3>
                </div>
                
                <div className="flex flex-col">
                  {rules.map((rule, idx) => (
                    <div 
                      key={idx} 
                      className={`p-6 md:p-12 hover-invert-cyan group cursor-default ${idx !== rules.length - 1 ? 'border-b border-grid' : ''} slide-in-right`}
                      ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                      style={{ transitionDelay: `${idx * 0.15}s` }}
                    >
                      <div className="flex items-start gap-6 md:gap-12">
                        <span className="text-2xl md:text-4xl font-serif-elegant font-black text-[#ccff00] group-hover:text-black mt-1">{rule.num}</span>
                        <div>
                          <h4 className="font-serif-elegant font-bold text-3xl md:text-5xl mb-4 group-hover:italic">{rule.title}</h4>
                          <p className="text-sm md:text-base leading-relaxed opacity-80 font-sans group-hover:font-bold">{rule.text}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const MenuSection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const menuItems = [
            { name: "Blackout Espresso", desc: "Darkest roast. Battery acid & dark chocolate.", price: "300" },
            { name: "Crimson Pour-Over", desc: "Ethiopian origin. Tart, bright, highly acidic.", price: "450" },
            { name: "Nitro Cold Blood", desc: "48-hour steep. Nitrogen infused. No ice.", price: "350" },
            { name: "The Anomaly Drip", desc: "Rotating experimental single origin.", price: "400" },
          ];

          return (
            <section id="menu" className="border-b border-grid bg-[#0b001a]">
              <div className="p-6 md:p-16 border-b border-grid relative overflow-hidden">
                <div className="absolute -right-20 -top-20 text-[#00f3ff] opacity-10 animate-spin-slow">
                  <Asterisk size={400} strokeWidth={0.5} />
                </div>
                <h3 className="text-xs uppercase tracking-[0.3em] text-[#ff0055] mb-2 fade-in-up font-bold" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>Section 04</h3>
                <h2 className="font-serif-elegant font-black text-6xl md:text-8xl text-[#ccff00] fade-in-up" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>Fuel Menu</h2>
              </div>

              <div className="flex flex-col">
                {menuItems.map((item, index) => (
                  <div 
                    key={index}
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                    className={`slide-in-right p-6 md:p-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover-invert-pink cursor-pointer group ${index !== menuItems.length - 1 ? 'border-b border-grid' : ''}`}
                    style={{ transitionDelay: `${index * 0.1}s` }}
                  >
                    <div className="flex-1">
                      <h4 className="font-serif-elegant font-bold text-3xl md:text-5xl mb-2 group-hover:italic">{item.name}</h4>
                      <p className="text-sm tracking-wide opacity-70 group-hover:opacity-100 font-sans group-hover:font-bold">{item.desc}</p>
                    </div>
                    <div className="flex items-center gap-8 mt-4 md:mt-0">
                      <span className="text-2xl md:text-4xl font-black tracking-widest text-[#00f3ff] group-hover:text-white">₹{item.price}</span>
                      <ArrowRight size={32} className="opacity-0 group-hover:opacity-100 transform -translate-x-8 group-hover:translate-x-0 transition-all duration-300" />
                    </div>
                  </div>
                ))}
              </div>
            </section>
          );
        };

        const MerchSection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const merch = [
            { title: "Heavy Duty Hoodie", price: "2999", color: "text-[#00f3ff]" },
            { title: "Acid Drop Tee", price: "1299", color: "text-[#ff0055]" },
            { title: "Toxic Tote Bag", price: "799", color: "text-[#ccff00]" },
          ];

          return (
            <section id="merch" className="border-b border-grid bg-[#0b001a]">
              <Marquee text="HARDWARE DROP /// HARDWARE DROP" bg="bg-[#00f3ff]" color="text-black" border="border-b border-grid" size="text-xl" />
              
              <div className="grid grid-cols-1 md:grid-cols-3">
                {merch.map((item, idx) => (
                  <div 
                    key={idx} 
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                    className={`fade-in-up aspect-square p-8 flex flex-col justify-between cursor-pointer group hover-invert-pink ${idx !== 2 ? 'border-b md:border-b-0 md:border-r border-grid' : ''}`}
                    style={{ transitionDelay: `${idx * 0.15}s` }}
                  >
                    <div className="flex justify-between items-start">
                      <span className="text-xs border border-current px-2 py-1 uppercase tracking-widest font-bold">New</span>
                      <span className="text-xl font-bold tracking-widest">₹{item.price}</span>
                    </div>
                    
                    <div className="flex flex-col items-center justify-center flex-1 my-8">
                       <span className={`font-serif-elegant font-black text-8xl transition-all duration-300 group-hover:scale-125 group-hover:rotate-12 ${item.color} group-hover:text-white`}>K</span>
                    </div>

                    <h3 className="font-serif-elegant font-bold text-3xl md:text-4xl leading-tight group-hover:italic">
                      {item.title}
                    </h3>
                  </div>
                ))}
              </div>
            </section>
          );
        };

        const Footer = () => (
          <footer className="p-6 md:p-16 flex flex-col md:flex-row justify-between items-end gap-12 bg-[#ccff00] text-black">
            <div>
              <h2 className="font-malayalam font-black text-6xl md:text-8xl leading-none mb-6 hover-jitter">കാപ്പി</h2>
              <p className="text-xs uppercase tracking-[0.2em] font-bold">Copyright © 2026. All Rights Reserved.</p>
            </div>
            
            <div className="flex flex-col gap-2 text-right text-sm uppercase tracking-widest font-bold">
              <a href="#" className="hover:text-[#ff0055] transition-colors">Instagram</a>
              <a href="#" className="hover:text-[#ff0055] transition-colors">Location</a>
              <a href="#" className="hover:text-[#ff0055] transition-colors">Contact</a>
            </div>
          </footer>
        );

        function App() {
          return (
            <>
              <CustomStyles />
              <div className="flex flex-col md:flex-row min-h-screen">
                <Sidebar />
                <main className="w-full md:w-3/4 flex flex-col border-l border-grid">
                  <HeroSection />
                  <ScrollytellingProtocol />
                  <PhilosophySection />
                  <MenuSection />
                  <MerchSection />
                  <Footer />
                </main>
              </div>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
