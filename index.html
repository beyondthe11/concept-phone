<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kāppi Coffee | Red & Black Editorial</title>
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Minimalist SVG Icons ---
        const ArrowRight = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const Asterisk = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 6v12"/><path d="M17.196 9 6.804 15"/><path d="m6.804 9 10.392 6"/></svg>
        );
        const Zap = ({ size, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );

        // --- Global Styles & Keyframes ---
        const CustomStyles = () => (
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400;1,900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Malayalam:wght@300;400;700;900&display=swap');

            :root {
              --bg: #FF1E00;         /* Main Red Color */
              --fg: #000000;         /* Black Text */
              --border: #000000;     /* Black Borders */
            }

            html {
              scroll-behavior: smooth;
            }

            body {
              background-color: var(--bg);
              color: var(--fg);
              font-family: 'Space Mono', monospace;
              overflow-x: hidden;
              margin: 0;
              -webkit-font-smoothing: antialiased;
            }

            body.loading-locked {
              overflow: hidden;
              height: 100vh;
            }

            .font-serif-elegant {
              font-family: 'Playfair Display', serif;
            }
            .font-malayalam {
              font-family: 'Noto Serif Malayalam', serif;
            }

            /* Editorial Borders */
            .border-grid {
              border-color: var(--border);
            }

            /* Custom Selection */
            ::selection {
              background: #000000;
              color: #FF1E00;
            }

            /* --- Animations --- */
            @keyframes marquee {
              0% { transform: translateX(0%); }
              100% { transform: translateX(-50%); }
            }

            .animate-marquee {
              display: inline-block;
              white-space: nowrap;
              animation: marquee 12s linear infinite;
            }

            @keyframes spin-slow {
              100% { transform: rotate(360deg); }
            }
            .animate-spin-slow {
              animation: spin-slow 10s linear infinite;
            }

            @keyframes float {
              0%, 100% { transform: translateY(0px) rotate(0deg); }
              50% { transform: translateY(-20px) rotate(5deg); }
            }
            .animate-float {
              animation: float 4s ease-in-out infinite;
            }

            .fade-in-up {
              opacity: 0;
              transform: translateY(40px) scale(0.95);
              transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .fade-in-up.is-visible {
              opacity: 1;
              transform: translateY(0) scale(1);
            }

            .slide-in-right {
              opacity: 0;
              transform: translateX(100px);
              transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .slide-in-right.is-visible {
              opacity: 1;
              transform: translateX(0);
            }

            /* Aggressive Hover States */
            .hover-invert {
              transition: all 0.3s ease;
            }
            .hover-invert:hover {
              background-color: #000000;
              color: #FF1E00;
              border-color: #000000;
            }
            .hover-invert:hover * {
              color: #FF1E00 !important;
            }

            .hover-invert-red {
              transition: all 0.3s ease;
            }
            .hover-invert-red:hover {
              background-color: #FF1E00;
              color: #000000;
              border-color: #FF1E00;
            }
            .hover-invert-red:hover * {
              color: #000000 !important;
            }

            .hover-jitter:hover {
              animation: jitter 0.2s infinite;
            }
            @keyframes jitter {
              0% { transform: translate(0, 0); }
              25% { transform: translate(2px, -2px); }
              50% { transform: translate(-2px, 2px); }
              75% { transform: translate(-2px, -2px); }
              100% { transform: translate(2px, 2px); }
            }

            /* --- Loader --- */
            .loader-overlay {
              position: fixed;
              inset: 0;
              background: var(--bg);
              z-index: 9999;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 1s;
            }
            .loader-overlay.fade-out {
              opacity: 0;
              visibility: hidden;
            }

            /* --- Minimal Scrollbar --- */
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: var(--bg); border-left: 2px solid var(--border); }
            ::-webkit-scrollbar-thumb { background: #000000; }
            ::-webkit-scrollbar-thumb:hover { background: #333333; }
          `}} />
        );

        // --- Hooks ---
        const useIntersectionObserver = (options) => {
          const [elements, setElements] = useState([]);

          useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('is-visible');
                }
              });
            }, options);

            elements.forEach((el) => el && observer.observe(el));
            return () => observer.disconnect();
          }, [elements, options]);

          return setElements;
        };

        const useScroll = () => {
          const [scrollY, setScrollY] = useState(0);
          useEffect(() => {
            const handleScroll = () => setScrollY(window.scrollY);
            window.addEventListener('scroll', handleScroll, { passive: true });
            handleScroll();
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);
          return scrollY;
        };

        // --- Components ---

        const Loader = ({ isFading }) => (
          <div className={`loader-overlay ${isFading ? 'fade-out' : ''}`}>
            <h1 className="font-malayalam text-black text-7xl md:text-9xl font-black mb-6 hover-jitter cursor-crosshair">കാപ്പി</h1>
            <div className="flex items-center gap-4">
              <Asterisk size={32} className="text-black animate-spin-slow" />
              <span className="font-mono text-sm md:text-base uppercase tracking-[0.2em] font-bold text-black animate-pulse">
                Extracting
              </span>
            </div>
          </div>
        );

        const Marquee = ({ text, bg = "bg-black", color = "text-[#FF1E00]", border = "border-y border-black", size = "text-xl md:text-2xl" }) => (
          <div className={`w-full overflow-hidden ${bg} ${color} ${border} py-2 flex relative z-10 font-bold uppercase tracking-widest`}>
            <div className={`animate-marquee whitespace-nowrap ${size}`}>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span><span className="mx-4">✺</span>
              <span className="mx-4">{text}</span>
            </div>
          </div>
        );

        const Header = () => (
          <header className="sticky top-0 z-50 bg-[#FF1E00] border-b-[3px] border-black p-4 md:p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div className="flex items-center justify-between w-full md:w-auto">
              <h1 className="font-malayalam text-black text-3xl md:text-5xl leading-none hover-jitter cursor-crosshair">കാപ്പി</h1>
              <p className="text-[10px] uppercase tracking-[0.2em] text-black font-bold ml-4 md:hidden">Est. 2026</p>
            </div>
            
            <nav className="flex flex-wrap justify-center gap-2 sm:gap-4 md:gap-6 lg:gap-8 text-[10px] sm:text-xs md:text-sm uppercase tracking-widest font-black text-black">
              <a href="#home" className="hover:bg-black hover:text-[#FF1E00] px-2 py-1 transition-colors">01. Home</a>
              <a href="#protocol" className="hover:bg-black hover:text-[#FF1E00] px-2 py-1 transition-colors">02. Protocol</a>
              <a href="#philosophy" className="hover:bg-black hover:text-[#FF1E00] px-2 py-1 transition-colors">03. Rules</a>
              <a href="#menu" className="hover:bg-black hover:text-[#FF1E00] px-2 py-1 transition-colors">04. Menu</a>
              <a href="#merch" className="hover:bg-black hover:text-[#FF1E00] px-2 py-1 transition-colors">05. Hardware</a>
            </nav>

            <div className="hidden lg:flex items-center gap-4">
                <Asterisk size={24} className="text-black animate-spin-slow" />
                <p className="text-[10px] uppercase tracking-widest text-black font-bold text-right leading-none">
                  Extracting Essence<br/>Est. 2026
                </p>
            </div>
          </header>
        );

        const HeroSection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          return (
            <section id="home" className="relative min-h-[70vh] md:min-h-screen flex flex-col justify-between border-b-[3px] border-black overflow-hidden bg-[#FF1E00]">
              
              <div className="absolute top-10 right-10 text-black animate-spin-slow opacity-20">
                <Asterisk size={200} strokeWidth={1} />
              </div>

              <div className="p-6 md:p-16 flex-1 flex flex-col justify-end z-10">
                <div className="max-w-5xl animate-float">
                  <h2 
                    className="font-serif-elegant text-[clamp(4rem,15vw,10rem)] font-black leading-[0.85] text-black mb-8 fade-in-up uppercase tracking-tighter break-words"
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                  >
                    Viscous.<br/>
                    <span className="italic text-transparent" style={{ WebkitTextStroke: '2px black' }}>Sensory.</span><br/>
                    <span className="hover-jitter inline-block">Coffee.</span>
                  </h2>
                  <p 
                    className="text-xs sm:text-sm md:text-base uppercase tracking-widest text-black max-w-xl leading-relaxed fade-in-up font-bold border-l-4 border-black pl-4" 
                    style={{transitionDelay: '0.2s'}}
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                  >
                    We treat coffee as a medium. No syrups. No distractions. Just meticulously extracted single origins that command your attention.
                  </p>
                </div>
              </div>

              <Marquee text="LIQUID ADRENALINE" bg="bg-black" color="text-[#FF1E00]" border="border-t-[3px] border-black" />
            </section>
          );
        };

        const ScrollytellingProtocol = () => {
          const scrollY = useScroll();
          const sectionRef = useRef(null);
          const [offsetTop, setOffsetTop] = useState(0);
          const [height, setHeight] = useState(0);

          useEffect(() => {
            if (sectionRef.current) {
              setOffsetTop(sectionRef.current.offsetTop);
              setHeight(sectionRef.current.offsetHeight);
            }
          }, [scrollY]);

          const windowHeight = window.innerHeight;
          const relativeScroll = Math.max(0, scrollY - offsetTop);
          const scrollableDistance = height - windowHeight;
          let progress = 0;
          if (scrollableDistance > 0) {
            progress = Math.min(1, relativeScroll / scrollableDistance);
          }

          let phase = "01. CRUSH";
          let bg = "bg-[#FF1E00]";
          let color = "text-black";
          
          if (progress > 0.33) {
            phase = "02. BLOOM";
            bg = "bg-black";
            color = "text-[#FF1E00]";
          }
          if (progress > 0.66) {
            phase = "03. EXTRACT";
            bg = "bg-[#FF1E00]";
            color = "text-black";
          }

          const subProgress = (progress % 0.33) * 3;
          const textScale = 0.8 + (subProgress * 0.7);

          return (
            <section id="protocol" ref={sectionRef} className="h-[300vh] border-b-[3px] border-black relative z-20">
              <div className={`sticky top-0 h-screen flex flex-col items-center justify-center overflow-hidden transition-colors duration-500 ${bg}`}>
                <div 
                  className="absolute opacity-10 text-current pointer-events-none"
                  style={{ transform: `rotate(${progress * 360}deg) scale(${1 + progress})` }}
                >
                  <Asterisk size={800} strokeWidth={0.5} />
                </div>

                <h2 
                  className={`font-serif-elegant font-black uppercase z-10 text-center tracking-tighter ${color} px-4`}
                  style={{ 
                    fontSize: 'clamp(3rem, 12vw, 12rem)',
                    transform: `scale(${textScale})`
                  }}
                >
                  {phase}
                </h2>
                
                <div className="absolute bottom-10 left-10 right-10 h-2 bg-black/20 overflow-hidden border border-current">
                   <div className="h-full bg-current" style={{ width: `${progress * 100}%` }}></div>
                </div>
              </div>
            </section>
          );
        };

        const PhilosophySection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const rules = [
            { num: "I", title: "Death to Decaf", text: "We roast beans that demand attention. Maximum flavor, uncompromising extraction, zero apologies." },
            { num: "II", title: "Locally Disruptive", text: "Sourced from the wildest high-altitude estates. Every batch pushes the absolute limits of the Maillard reaction." },
            { num: "III", title: "Unadulterated", text: "No caramel-pumpkin-vanilla distractions. We respect the terroir. If you need sugar to hide the taste, you're drinking the wrong coffee." }
          ];

          return (
            <section id="philosophy" className="border-b-[3px] border-black bg-[#FF1E00]">
              <Marquee text="THE MANIFESTO" bg="bg-black" color="text-[#FF1E00]" border="border-b-[3px] border-black" size="text-xl" />
              
              <div className="grid grid-cols-1 lg:grid-cols-2">
                <div className="p-6 md:p-16 border-b-[3px] lg:border-b-0 lg:border-r-[3px] border-black flex items-center justify-center">
                  <h3 className="font-serif-elegant font-black text-[clamp(4rem,10vw,6rem)] leading-[0.9] text-center lg:text-left fade-in-up text-black uppercase break-words" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>
                    The<br/>
                    <span className="italic text-transparent" style={{ WebkitTextStroke: '2px black' }}>Rules.</span>
                  </h3>
                </div>
                
                <div className="flex flex-col">
                  {rules.map((rule, idx) => (
                    <div 
                      key={idx} 
                      className={`p-6 md:p-12 hover-invert group cursor-default ${idx !== rules.length - 1 ? 'border-b-[3px] border-black' : ''} slide-in-right`}
                      ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                      style={{ transitionDelay: `${idx * 0.15}s` }}
                    >
                      <div className="flex flex-col sm:flex-row items-start gap-4 sm:gap-8 md:gap-12">
                        <span className="text-2xl md:text-4xl font-serif-elegant font-black text-black mt-1">{rule.num}</span>
                        <div>
                          <h4 className="font-serif-elegant font-black uppercase text-2xl sm:text-3xl md:text-5xl mb-4 group-hover:italic">{rule.title}</h4>
                          <p className="text-xs sm:text-sm md:text-base leading-relaxed opacity-90 font-sans group-hover:font-bold text-black">{rule.text}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const MenuSection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const menuItems = [
            { name: "Blackout Espresso", desc: "Darkest roast. Battery acid & dark chocolate.", price: "300" },
            { name: "Crimson Pour-Over", desc: "Ethiopian origin. Tart, bright, highly acidic.", price: "450" },
            { name: "Nitro Cold Blood", desc: "48-hour steep. Nitrogen infused. No ice.", price: "350" },
            { name: "The Anomaly Drip", desc: "Rotating experimental single origin.", price: "400" },
          ];

          return (
            <section id="menu" className="border-b-[3px] border-black bg-[#FF1E00]">
              <div className="p-6 md:p-16 border-b-[3px] border-black relative overflow-hidden">
                <div className="absolute -right-20 -top-20 text-black opacity-10 animate-spin-slow">
                  <Asterisk size={400} strokeWidth={0.5} />
                </div>
                <h3 className="text-xs uppercase tracking-[0.3em] text-black mb-2 fade-in-up font-black" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>Section 04</h3>
                <h2 className="font-serif-elegant font-black uppercase text-[clamp(3.5rem,10vw,8rem)] leading-none text-black fade-in-up break-words" ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}>Fuel Menu</h2>
              </div>

              <div className="flex flex-col">
                {menuItems.map((item, index) => (
                  <div 
                    key={index}
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                    className={`slide-in-right p-6 md:p-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover-invert cursor-pointer group ${index !== menuItems.length - 1 ? 'border-b-[3px] border-black' : ''}`}
                    style={{ transitionDelay: `${index * 0.1}s` }}
                  >
                    <div className="flex-1 w-full md:w-auto">
                      <h4 className="font-serif-elegant font-black uppercase text-2xl sm:text-3xl md:text-5xl mb-2 group-hover:italic text-black break-words">{item.name}</h4>
                      <p className="text-xs sm:text-sm tracking-wide opacity-80 group-hover:opacity-100 font-sans font-bold text-black">{item.desc}</p>
                    </div>
                    <div className="flex items-center justify-between md:justify-end w-full md:w-auto gap-8 mt-4 md:mt-0">
                      <span className="text-2xl md:text-4xl font-black tracking-widest text-black">₹{item.price}</span>
                      <ArrowRight size={32} className="opacity-0 group-hover:opacity-100 transform -translate-x-8 group-hover:translate-x-0 transition-all duration-300 text-black" />
                    </div>
                  </div>
                ))}
              </div>
            </section>
          );
        };

        const MerchSection = () => {
          const [refs, setRefs] = useState([]);
          const observe = useIntersectionObserver({ threshold: 0.1 });

          useEffect(() => observe(refs), [refs, observe]);

          const merch = [
            { title: "Heavy Duty Hoodie", price: "2999" },
            { title: "Acid Drop Tee", price: "1299" },
            { title: "Toxic Tote Bag", price: "799" },
          ];

          return (
            <section id="merch" className="border-b-[3px] border-black bg-[#FF1E00]">
              <Marquee text="HARDWARE DROP /// HARDWARE DROP" bg="bg-black" color="text-[#FF1E00]" border="border-b-[3px] border-black" size="text-xl" />
              
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3">
                {merch.map((item, idx) => (
                  <div 
                    key={idx} 
                    ref={el => el && !refs.includes(el) && setRefs(prev => [...prev, el])}
                    className={`fade-in-up aspect-square p-6 md:p-8 flex flex-col justify-between cursor-pointer group hover-invert ${idx !== 2 ? 'border-b-[3px] sm:border-b-0 sm:border-r-[3px] border-black' : ''}`}
                    style={{ transitionDelay: `${idx * 0.15}s` }}
                  >
                    <div className="flex justify-between items-start">
                      <span className="text-[10px] sm:text-xs border-2 border-black group-hover:border-[#FF1E00] px-2 py-1 uppercase tracking-widest font-black text-black">New</span>
                      <span className="text-lg sm:text-xl font-black tracking-widest text-black">₹{item.price}</span>
                    </div>
                    
                    <div className="flex flex-col items-center justify-center flex-1 my-8">
                       <span className={`font-serif-elegant font-black text-6xl sm:text-8xl transition-all duration-300 group-hover:scale-125 group-hover:rotate-12 text-black`}>K</span>
                    </div>

                    <h3 className="font-serif-elegant font-black uppercase text-2xl sm:text-3xl md:text-4xl leading-tight group-hover:italic text-black break-words">
                      {item.title}
                    </h3>
                  </div>
                ))}
              </div>
            </section>
          );
        };

        const Footer = () => (
          <footer className="p-6 md:p-16 flex flex-col md:flex-row justify-between items-start md:items-end gap-8 md:gap-12 bg-black text-[#FF1E00]">
            <div className="w-full md:w-auto">
              <h2 className="font-malayalam font-black text-[clamp(4rem,12vw,8rem)] leading-none mb-6 hover-jitter cursor-crosshair">കാപ്പി</h2>
              <p className="text-[10px] md:text-xs uppercase tracking-[0.2em] font-bold">Copyright © 2026. All Rights Reserved.</p>
            </div>
            
            <div className="flex flex-row md:flex-col gap-4 md:gap-2 text-left md:text-right text-[10px] md:text-sm uppercase tracking-widest font-black flex-wrap">
              <a href="#" className="hover:text-white transition-colors">Instagram</a>
              <a href="#" className="hover:text-white transition-colors">Location</a>
              <a href="#" className="hover:text-white transition-colors">Contact</a>
            </div>
          </footer>
        );

        function App() {
          const [isLoading, setIsLoading] = useState(true);
          const [isFading, setIsFading] = useState(false);

          useEffect(() => {
            // Lock body scrolling while loading
            document.body.classList.add('loading-locked');

            const fadeTimer = setTimeout(() => {
              setIsFading(true);
            }, 1800); // Wait 1.8 seconds before triggering fade

            const removeTimer = setTimeout(() => {
              setIsLoading(false);
              document.body.classList.remove('loading-locked');
            }, 2800); // 1.8s wait + 1s fade animation duration

            return () => {
              clearTimeout(fadeTimer);
              clearTimeout(removeTimer);
              document.body.classList.remove('loading-locked');
            };
          }, []);

          return (
            <>
              <CustomStyles />
              {isLoading && <Loader isFading={isFading} />}
              <div className="flex flex-col min-h-screen">
                <Header />
                <main className="w-full flex flex-col border-grid">
                  <HeroSection />
                  <ScrollytellingProtocol />
                  <PhilosophySection />
                  <MenuSection />
                  <MerchSection />
                  <Footer />
                </main>
              </div>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
